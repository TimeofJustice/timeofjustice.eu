name: Django Deployment

on:
  push:
    branches: [legacy]
    paths:
      - backend/**
      - .github/workflows/**

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Check out current repository
        uses: actions/checkout@v4

      - name: Create virtual environment
        run: |
          cd backend/
          python3.12 -m venv .env
          source .env/bin/activate
          pip3.12 install -r requirements.txt

      - name: Run Django migrations
        run: |
          cd backend/
          source .env/bin/activate
          python3.12 manage.py migrate

      - name: Collect static files
        run: |
          cd backend/
          source .env/bin/activate
          python3.12 manage.py collectstatic --noinput

      - name: Django Deploy
        run: |
          rsync -r --delete-delay backend/ /var/www/timeofjustice.eu/backend/

      - name: Link to storage
        run: |
          ln -s ../files /var/www/timeofjustice.eu/backend/files

      - name: Link to templates
        run: |
          ln -s ../frontend /var/www/timeofjustice.eu/backend/frontend

      - name: Trigger gunicorn to reload
        run: |
          sudo /bin/systemctl restart legacy.gunicorn.service
